  <line x1="35" y1="33" x2="38" y2="43" stroke="#A0522D" stroke-width="1.5"/>
  <line x1="43" y1="31" x2="45" y2="44" stroke="#A0522D" stroke-width="1.5"/>
  <line x1="50" y1="30" x2="50" y2="44" stroke="#A0522D" stroke-width="1.5"/>
  <line x1="57" y1="31" x2="55" y2="44" stroke="#A0522D" stroke-width="1.5"/>
  <line x1="65" y1="33" x2="62" y2="43" stroke="#A0522D" stroke-width="1.5"/>
  <!-- Acorn body -->
  <path d="M30 44 Q30 78 50 82 Q70 78 70 44Z" fill="#DAA520"/>
  <path d="M38 48 Q36 65 50 78" stroke="#C8961E" stroke-width="2" fill="none" stroke-linecap="round"/>
